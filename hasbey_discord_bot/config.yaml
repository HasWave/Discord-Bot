name: HasBEY Discord Bot
version: '2.0.3'
slug: hasbey_discord_bot
description: >-
  Raspberry Pi Supervisor. Zorunlu: discord_token, guild_id.
  Rol alanları: yalnızca misafir (bot_guest_role_id) ve kayıt sonrası teşkilat rolü (bot_member_role_id).
  Diğer şablon rolleri sunucuda /start veya data/guilds/<id>.json ile gelir; panelde sorulmaz.
  Kanal ID’leri isteğe bağlı; boş bırakılanlar JSON’daki değeri korur.
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ports: {}
ports_description: {}
map:
  - share:rw
options:
  discord_token: ''
  client_id: ''
  guild_id: ''
  bot_owner_user_id: ''
  bot_slash_commands_channel_id: ''
  bot_guest_slash_channel_id: ''
  bot_last_registered_display_channel_id: ''
  bot_member_count_channel_id: ''
  bot_lobby_voice_channel_id: ''
  bot_temp_category_id: ''
  bot_ara_command_channel_id: ''
  bot_ara_notify_channel_id: ''
  bot_stream_announce_channel_id: ''
  bot_afk_voice_channel_id: ''
  bot_registration_log_channel_id: ''
  bot_player_category_id: ''
  bot_rules_channel_id: ''
  bot_announcement_channel_id: ''
  bot_guest_role_id: ''
  bot_member_role_id: ''
schema:
  discord_token: password
  client_id: str?
  guild_id: str
  bot_owner_user_id: str?
  bot_slash_commands_channel_id: str?
  bot_guest_slash_channel_id: str?
  bot_last_registered_display_channel_id: str?
  bot_member_count_channel_id: str?
  bot_lobby_voice_channel_id: str?
  bot_temp_category_id: str?
  bot_ara_command_channel_id: str?
  bot_ara_notify_channel_id: str?
  bot_stream_announce_channel_id: str?
  bot_afk_voice_channel_id: str?
  bot_registration_log_channel_id: str?
  bot_player_category_id: str?
  bot_rules_channel_id: str?
  bot_announcement_channel_id: str?
  bot_guest_role_id: str?
  bot_member_role_id: str?
