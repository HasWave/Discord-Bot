name: HasBEY Discord Bot
version: '2.0.0'
slug: hasbey_discord_bot
description: >-
  Kök HasBEY botunun Raspberry Pi Supervisor sürümü. Zorunlu: discord_token, guild_id.
  Kanal/rol alanlarını doldurduğunuzda her başlangıçta data/guilds/<guild_id>.json güncellenir.
  Boş bırakılan alanlar mevcut JSON değerini silmez. İsteğe bağlı: client_id (slash deploy),
  bot_owner_user_id (setupComplete). Kurallar/Duyuru kanalı: bot_rules_channel_id, bot_announcement_channel_id.
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ports: {}
ports_description: {}
map:
  - share:rw
options:
  discord_token: ''
  client_id: ''
  guild_id: ''
  bot_owner_user_id: ''
  bot_slash_commands_channel_id: ''
  bot_guest_slash_channel_id: ''
  bot_last_registered_display_channel_id: ''
  bot_member_count_channel_id: ''
  bot_lobby_voice_channel_id: ''
  bot_temp_category_id: ''
  bot_ara_command_channel_id: ''
  bot_ara_notify_channel_id: ''
  bot_stream_announce_channel_id: ''
  bot_afk_voice_channel_id: ''
  bot_registration_log_channel_id: ''
  bot_player_category_id: ''
  bot_rules_channel_id: ''
  bot_announcement_channel_id: ''
  bot_guest_role_id: ''
  bot_member_role_id: ''
  bot_owner_role_id: ''
  bot_admin_role_id: ''
  bot_mod_role_id: ''
  bot_trial_mod_role_id: ''
  bot_kick_mod_role_id: ''
  bot_support_role_id: ''
  bot_event_role_id: ''
  bot_streamer_role_id: ''
  bot_developer_role_id: ''
  bot_vip_role_id: ''
  bot_tag_role_id: ''
  bot_female_role_id: ''
  bot_drama_queen_role_id: ''
