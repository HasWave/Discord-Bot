name: HasBEY Discord Bot
version: '1.2.0'
slug: hasbey_discord_bot
description: >-
  Raspberry Pi / Home Assistant Supervisor. Yapılandır: (1) discord_token = Bot token.
  (2) guild_id = sunucu ID (yalnız rakamlar veya .../guilds/ID.json içeren adres).
  Sunucu ayarı: File Editor ile /share/hasbey_discord_bot_data/guilds/<SUNUCU_ID>.json
  (PC’deki data/guilds/<id>.json içeriği). Token alanına URL yazmayın.
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ports: {}
ports_description: {}
map:
  - share:rw
options:
  discord_token: ''
  guild_id: ''
schema:
  discord_token: password
  guild_id: str
